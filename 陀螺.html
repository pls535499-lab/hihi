<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子極速 - 碰撞與搖晃物理模擬器</title>
    <style>
        /* 入場與動態動畫 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 242, 254, 0.5); }
            100% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeInDown 1s ease-out forwards;
        }
        header h1 {
            font-size: 2.8rem;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.3);
            margin-bottom: 8px;
        }
        header p {
            color: #70708a;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        /* 核心佈局 */
        .container {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            gap: 40px;
            max-width: 950px;
            width: 90%;
            animation: fadeInUp 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        /* 競技場外圈 */
        .canvas-area {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .stadium-ring {
            padding: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2d3748, #1a202c);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            animation: glowPulse 3s infinite ease-in-out;
        }
        canvas {
            background: radial-gradient(circle, #1e1e30, #0f0f1a);
            border-radius: 50%;
            display: block;
        }

        /* 控制面板 */
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stats {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stats p {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #a0aec0;
            display: flex;
            justify-content: space-between;
        }
        .stats span {
            color: #00f2fe;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(0,242,254,0.5);
        }

        .control-group {
            margin-bottom: 22px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }
        .control-group input[type="range"] {
            width: 100%;
            accent-color: #00f2fe;
            background: #2d3748;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        /* 按鈕 */
        .btn {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: #fff;
            border: none;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.7);
        }
        .btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .control-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>QUANTUM SPIN V2</h1>
        <p>物理碰壁反彈 ‧ 尾盤末路搖晃模擬</p>
    </header>

    <div class="container">
        <div class="canvas-area">
            <div class="stadium-ring" id="stadium">
                <canvas id="gyroCanvas" width="360" height="360"></canvas>
            </div>
        </div>

        <div class="control-panel">
            <div class="stats">
                <p>瞬時轉速: <span id="rpmVal">0 RPM</span></p>
                <p>能量負載: <span id="energyVal">0%</span></p>
                <p>累計圈數: <span id="turnsVal">0 ROT</span></p>
            </div>

            <div class="control-group">
                <label for="friction">空氣阻力 (阻尼係數)</label>
                <input type="range" id="friction" min="0.002" max="0.04" step="0.001" value="0.008">
            </div>

            <div class="control-group">
                <label for="gyroColor">光子核心色彩調頻</label>
                <input type="range" id="gyroColor" min="0" max="360" step="1" value="200">
            </div>

            <button class="btn" id="launchBtn">💥 超頻發射 💥</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gyroCanvas');
        const ctx = canvas.getContext('2d');
        const stadium = document.getElementById('stadium');

        const launchBtn = document.getElementById('launchBtn');
        const frictionInput = document.getElementById('friction');
        const colorInput = document.getElementById('gyroColor');
        const rpmVal = document.getElementById('rpmVal');
        const energyVal = document.getElementById('energyVal');
        const turnsVal = document.getElementById('turnsVal');

        // 陀螺自身物理屬性
        let angle = 0;
        let angularVelocity = 0;
        let totalTurns = 0;
        const maxVelocity = 1.8;
        const gyroRadius = 55; // 陀螺的物理碰撞半徑

        // 碰壁移動物理學 (2D 位移座標)
        const arenaRadius = canvas.width / 2; // 圓形競技場半徑 (180)
        let gyroX = arenaRadius; // 起始 X 座標點 (圓心)
        let gyroY = arenaRadius; // 起始 Y 座標點 (圓心)
        let vx = 0; // X 軸移動速度
        let vy = 0; // Y 軸移動速度

        // 粒子特效陣列 (發射粒子、碰撞火花)
        let particles = [];

        class Particle {
            constructor(x, y, moveAngle, speed, color, decay = 0.02) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(moveAngle) * speed;
                this.vy = Math.sin(moveAngle) * speed;
                this.radius = Math.random() * 3 + 1.5;
                this.color = color;
                this.alpha = 1;
                this.decay = decay;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // 觸發反彈火花函數
        function spawnSparks(x, y, normalAngle) {
            for (let i = 0; i < 15; i++) {
                // 火花朝法線反方向散射
                const sparkAngle = normalAngle + Math.PI + (Math.random() - 0.5) * 1.5;
                const speed = Math.random() * 4 + 2;
                particles.push(new Particle(x, y, sparkAngle, speed, '#ffa500', 0.04));
            }
        }

        launchBtn.addEventListener('click', () => {
            // 賦予極高旋轉速度
            angularVelocity = Math.min(maxVelocity, angularVelocity + 0.9 + Math.random() * 0.3);
            
            // 發射時給予一個隨機的橫向運動推力
            const pushAngle = Math.random() * Math.PI * 2;
            const pushSpeed = Math.random() * 3 + 3;
            vx = Math.cos(pushAngle) * pushSpeed;
            vy = Math.sin(pushAngle) * pushSpeed;

            // 產生中心噴射粒子
            const hue = parseInt(colorInput.value);
            for (let i = 0; i < 30; i++) {
                const pAngle = Math.random() * Math.PI * 2;
                particles.push(new Particle(gyroX, gyroY, pAngle, Math.random() * 3 + 1, `hsl(${hue}, 100%, 60%)`, 0.02));
            }
        });

        // 繪製主陀螺（包含快停下的 Wobble 搖晃軸偏置與立體投影）
        function drawGyro(x, y, currentAngle, hue, speedRatio) {
            ctx.save();
            ctx.translate(x, y);

            // 核心物理動畫機制：快停下時的「極速搖晃晃動（Wobble Effect）」
            let wobbleX = 0;
            let wobbleY = 0;
            let wobbleScaleX = 1;
            let wobbleScaleY = 1;

            // 當轉速低於某個閾值，且還在轉動時觸發
            if (angularVelocity > 0 && angularVelocity < 0.2) {
                const wobbleIntensity = (1 - (angularVelocity / 0.2)) * 12; // 越慢搖得越厲害
                const wobbleSpeed = Date.now() * 0.05; // 搖晃頻率
                
                wobbleX = Math.sin(wobbleSpeed) * wobbleIntensity * 0.3;
