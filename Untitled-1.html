<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山系指南 - 探索自然之美</title>
    <style>
        /* 全域樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden; /* 防止滾動時水平出現白邊 */
        }

        /* 導覽列 */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: bold;
        }

        nav a:hover {
            color: #18bc9c;
        }

        /* 🌲 【動態修改】英雄視覺區容器與背景動畫 */
        .hero-container {
            height: 60vh;
            position: relative;
            overflow: hidden; /* 確保圖片放大時不會超出範圍 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), url('https://unsplash.com') no-repeat center center/cover;
            z-index: 1;
            /* 觸發漸顯與微放大動畫 */
            animation: zoomFadeIn 2.5s ease-out forwards;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 0 1rem;
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            /* 文字由下往上滑入 */
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
            /* 文字接著滑入 */
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        /* 主要內容區 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            margin-bottom: 3rem;
        }

        section h3 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #18bc9c;
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        /* 路線卡片欄位 */
        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* 🌊 【動態修改】卡片滾動載入基礎樣式 */
        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            
            /* 預設隱藏並往下移，等待 JS 觸發 */
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out, box-shadow 0.3s;
        }

        /* 當滾動到可見範圍時，JS 會加上此類別 */
        .card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-content h4 {
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        .badge {
            background-color: #18bc9c;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .badge.hard {
            background-color: #e74c3c;
        }

        /* 裝備清單互動區 */
        .checklist {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .check-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .check-item input {
            margin-right: 1rem;
            width: 18px;
            height: 18px;
            accent-color: #18bc9c;
        }

        .completed {
            text-decoration: line-through;
            color: #aaa;
        }

        /* 頁尾 */
        footer {
            background-color: #2c3e50;
            color: #fff;
            text-align: center;
            padding: 1.5rem;
            margin-top: 4rem;
        }

        /* 🎬 KEYFRAMES 動態特效定義 */
        /* 背景圖片：從淡入 + 1.15倍放大，慢慢縮小回原樣，模擬航拍拉遠感 */
        @keyframes zoomFadeIn {
            0% {
                opacity: 0;
                transform: scale(1.15);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 文字：從下方透明狀態，向上滑入並變亮 */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 響應式調整 */
        @media (max-width: 768px) {
            .hero h2 { font-size: 2rem; }
            header { flex-direction: column; gap: 1rem; }
            nav a { margin: 0 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <header>
        <h1>⛰️ 山系指南</h1>
        <nav>
            <a href="#routes">精選路線</a>
            <a href="#checklist">裝備檢查</a>
        </nav>
    </header>

    <!-- 🌲 【修改結構】英雄主視覺區 -->
    <div class="hero-container hero">
        <!-- 獨立的動畫背景層 -->
        <div class="hero-bg"></div>
        <!-- 文字內容層 -->
        <div class="hero-content">
            <h2>用雙腳丈量世界</h2>
            <p>遠離城市喧囂，走進大自然。為你提供最專業的行山路線指南與安全建議。</p>
        </div>
    </div>

    <div class="container">
        <!-- 精選路線區塊 -->
        <section id="routes">
            <h3>📍 精選行山路線</h3>
            <div class="routes-grid">
                <!-- 卡片 1 -->
                <div class="card">
                    <img src="https://unsplash.com" alt="初學者路線">
                    <div class="card-content">
                        <span class="badge">新手入門</span>
                        <h4>翠綠谷休閒步道</h4>
                        <p>坡度平緩、沿途樹蔭茂密，非常適合全家大小週末踏青，沿途設有豐富的生態解說牌。</p>
                    </div>
                </div>
                <!-- 卡片 2 -->
                <div class="card">
                    <img src="https://unsplash.com" alt="挑戰者路線">
                    <div class="card-content">
                        <span class="badge hard">高手挑戰</span>
                        <h4>凌雲峰禦風縱走</h4>
                        <p>極具挑戰性的攀爬路線，部分路段需拉繩前進。登頂後可360度俯瞰壯麗連綿的山脈景致。</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 裝備清單區塊 -->
        <section id="checklist">
            <h3>🎒 出發前裝備檢查</h3>
            <div class="checklist">
                <p style="margin-bottom: 1rem; color: #666;">點擊項目即可標記為已打包：</p>
                <label class="check-item">
                    <input type="checkbox" onclick="toggleItem(this)"> 登山鞋（良好抓地力）
                </label>
                <label class="check-item">
                    <input type="checkbox" onclick="toggleItem(this)"> 充足的飲用水（建議 1.5L 以上）
                </label>
                <label class="check-item">
                    <input type="checkbox" onclick="toggleItem(this)"> 行動糧食（高熱量零食、能量棒）
                </label>
                <label class="check-item">
                    <input type="checkbox" onclick="toggleItem(this)"> 離線地圖與導航離線APP
                </label>
                <label class="check-item">
                    <input type="checkbox" onclick="toggleItem(this)"> 個人急救包與常用藥品
                </label>
            </div>
        </section>
    </div>

    <!-- 頁尾 -->
    <footer>
        <p>&copy; 2026 山系指南 Hiking Guide. 保留所有權利。安全行山，無痕山林。</p>
    </footer>

    <!-- 互動指令 -->
    <script>
        // 裝備清單打勾特效
        function toggleItem(checkbox) {
            const label = checkbox.parentElement;
            if (checkbox.checked) {
                label.classList.add('completed');
            } else {
                label.classList.remove('completed');
            }
        }

        // 🌊 【新增 JS】偵測滾動：當卡片進入畫面時才滑入顯現
        const cards = document.querySelectorAll('.card');
        
        const revealOnScroll = () => {
            const triggerBottom = window.innerHeight * 0.85; // 設定觸發點在畫面下緣往上 15% 處
            
            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top;
                if (cardTop < triggerBottom) {
                    card.classList.add('reveal');
                }
            });
        };

        // 監聽滾動事件
        window.addEventListener('scroll', revealOnScroll);
        // 網頁剛載入時先執行一次（防止首屏卡片沒出來）
        window.addEventListener('DOMContentLoaded', revealOnScroll);
    </script>
</body>
</html>
